name: Lint

on: [push]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lua-check:
    name: Lua Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
      checks: write
      pull-requests: read
    if: (github.actor != 'dependabot[bot]')

    steps:
    - name: Checkout source code
      uses: actions/checkout@v6.0.2

    # Optional step to run on only changed files
    - name: Get changed files
      id: changed-files
      uses: tj-actions/changed-files@v47.0.6
      with:
        separator: "\n"
        files: |
          **.lua

    - name: Skip if no Lua files changed
      if: steps.changed-files.outputs.any_changed != 'true'
      run: echo "No Lua files changed, skipping linter."
      continue-on-error: true

    - name: List changed files
      if: steps.changed-files.outputs.any_changed == 'true'
      env:
        CHANGED_FILES: ${{ steps.changed-files.outputs.all_changed_files }}
      run: |
        echo "$CHANGED_FILES" | while IFS= read -r file; do
          [[ -n "$file" ]] && echo "$file was changed"
        done

    - name: Setup Lua
      if: steps.changed-files.outputs.any_changed == 'true'
      uses: leafo/gh-actions-lua@35bcb06abec04ec87df82e08caa84d545348536e # v10
      with:
        luaVersion: "5.1"

    - name: Setup LuaRocks
      if: steps.changed-files.outputs.any_changed == 'true'
      uses: leafo/gh-actions-luarocks@e65774a6386cb4f24e293dca7fc4ff89165b64c5 # v4

    - name: Install Luacheck
      if: steps.changed-files.outputs.any_changed == 'true'
      run: luarocks install luacheck

    - name: Lua Check
      if: steps.changed-files.outputs.any_changed == 'true'
      env:
        CHANGED_FILES: ${{ steps.changed-files.outputs.all_changed_files }}
      shell: bash
      run: |
        mapfile -t files < <(echo "$CHANGED_FILES" | sed '/^\s*$/d')
        if [ "${#files[@]}" -eq 0 ]; then
          echo "No Lua files to check."
          exit 0
        fi
        luacheck --codes --ranges "${files[@]}"